apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: 
  name: helm-app
  namespace: argocd
spec: 
  project: default
  destination: 
    server: "https://kubernetes.default.svc"
    namespace: helm-app
  source: 
    repoURL: "https://github.com/argoproj/argocd-example-apps.git"
    path: helm-guestbook
    targetRevision: master
    helm:
     # release name
     releaseName: helm-guestbook
  syncPolicy:
    syncOptions:
      - CreateNamespace=true