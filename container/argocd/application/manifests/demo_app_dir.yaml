apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dir-app
  namespace: argocd
spec:
  project: default
  destination:
    server: "https://kubernetes.default.svc"
    namespace: dir-app
  source:
    repoURL: "https://github.com/argoproj/argocd-example-apps.git"
    targetRevision: master
    path: apps
  syncPolicy:
    syncOptions:
      - CreateNamespace=true